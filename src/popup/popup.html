<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="tw-popup">
    <h1>网页翻译</h1>
    <button id="tw-toggle" class="tw-btn">翻译此页 / 恢复原文</button>
    <label class="tw-row">
      <span>目标语言</span>
      <select id="tw-lang">
        <option>简体中文</option>
        <option>繁體中文</option>
        <option>English</option>
        <option>日本語</option>
        <option>한국어</option>
      </select>
    </label>
    <div id="tw-status" class="tw-status"></div>
    <a id="tw-settings" href="#" class="tw-link">打开设置</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
